<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>study · 个人学习资料</title>
  <style>
    :root {
      --bg: #fafafa;
      --fg: #1f2328;
      --muted: #57606a;
      --border: #d0d7de;
      --accent: #0969da;
      --card: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --accent: #58a6ff;
        --card: #161b22;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
            "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    .wrap { max-width: 880px; margin: 0 auto; padding: 48px 24px 96px; }
    header { margin-bottom: 32px; }
    h1 { font-size: 28px; margin: 0 0 8px; letter-spacing: -0.01em; }
    .tagline { color: var(--muted); margin: 0; }
    h2 {
      font-size: 18px;
      margin: 40px 0 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
    }
    .card + .card { margin-top: 12px; }
    .card h3 { margin: 0 0 6px; font-size: 16px; }
    .card h3 a { color: var(--accent); text-decoration: none; }
    .card h3 a:hover { text-decoration: underline; }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin: 0 0 8px;
    }
    .meta span + span::before { content: " · "; margin: 0 2px; }
    .desc { margin: 8px 0 0; color: var(--fg); }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 4px 10px;
      font-size: 13px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--fg);
      text-decoration: none;
      background: var(--bg);
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .empty {
      color: var(--muted);
      font-style: italic;
    }
    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>study</h1>
      <p class="tagline">个人学习资料仓库</p>
    </header>

    <section>
      <h2>timeseries</h2>
      <p class="tagline">时间序列 · 异常检测方向</p>

      <article class="card">
        <h3>
          <a href="timeseries/pdf/CN115391160B.pdf">CN115391160B · 一种异常变更检测方法、装置、设备及存储介质</a>
        </h3>
        <p class="meta">
          <span>授权日 2023.04.07</span>
          <span>申请人 北京必示科技有限公司</span>
          <span>PDF · 1.7 MB</span>
        </p>
        <p class="desc">
          基于历史同期数据与变更前后数据的多组目标学生网络对指标数据进行异常变更检测，
          可提高对软件服务系统变更的异常检测准确率，并降低模型训练开销。
        </p>
        <div class="actions">
          <a class="btn" href="timeseries/pdf/CN115391160B.pdf" target="_blank" rel="noopener">在新窗口打开</a>
          <a class="btn" href="timeseries/pdf/CN115391160B.pdf" download>下载</a>
        </div>
      </article>
    </section>

    <footer>
      <p>更多资料持续整理中。</p>
    </footer>
  </div>
</body>
</html>
